<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quadrato — Carlos Mera</title>
  <meta name="description" content="Quadrato — An NFT protocol democratising standards on Solana. Designed by Carlos Mera.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #0a0a0a; }

    .q-meta-bar {
      position: sticky;
      top: 60px;
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: .75rem var(--pad);
      background: rgba(10,10,10,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .q-meta-back {
      font-size: .8125rem;
      color: rgba(255,255,255,.45);
      text-decoration: none;
      transition: color .15s;
      white-space: nowrap;
    }
    .q-meta-back:hover { color: rgba(255,255,255,.9); }
    .q-meta-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .375rem;
      flex: 1;
    }
    .q-meta-tags span {
      font-size: .6875rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      background: rgba(255,255,255,.06);
      padding: .2rem .6rem;
      border-radius: 2px;
    }
    .q-meta-year {
      font-size: .8125rem;
      color: rgba(255,255,255,.25);
      white-space: nowrap;
    }

    .q-case-study {
      width: 100%;
      max-width: 1512px;
      margin: 0 auto;
    }
    .q-case-study img {
      display: block;
      width: 100%;
      height: auto;
    }

    .proj-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3rem var(--pad);
      border-top: 1px solid rgba(255,255,255,.07);
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .proj-nav__back {
      font-size: .875rem;
      color: rgba(255,255,255,.4);
      text-decoration: none;
      transition: color .15s;
    }
    .proj-nav__back:hover { color: rgba(255,255,255,.85); }
    .proj-nav__next { text-align: right; }
    .proj-nav__label {
      display: block;
      font-size: .6875rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.25);
      margin-bottom: .25rem;
    }
    .proj-nav__title {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      transition: color .15s;
    }
    .proj-nav__title:hover { color: #fff; }
  </style>
</head>
<body>

  <header class="nav" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">CM</a>
      <nav class="nav__links">
        <a href="index.html#work">Work</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
        <a href="https://www.linkedin.com/in/carlosmmera/" target="_blank" rel="noopener" class="nav__cta">LinkedIn ↗</a>
      </nav>
    </div>
  </header>

  <div class="q-meta-bar">
    <a href="index.html#work" class="q-meta-back">← Work</a>
    <div class="q-meta-tags">
      <span>Web3</span><span>NFT</span><span>Product Design</span><span>Interaction Design</span>
    </div>
    <span class="q-meta-year">2023</span>
  </div>

  <main>
    <div class="q-case-study">
      <img src="quadrato-img/01_hero.png"          alt="Quadrato — Hero: NFTs Web3 dapp on Solana" loading="eager">
      <img src="quadrato-img/02_problem.png"        alt="The Problem and The Solution" loading="lazy">
      <img src="quadrato-img/03_proposal.png"       alt="The Proposal — Quadrato metadata program architecture" loading="lazy">
      <img src="quadrato-img/04_audience.png"       alt="The Target Audience — 8.5M+ wallets, $0.00012 minting, 32M+ NFTs" loading="lazy">
      <img src="quadrato-img/05_benchmark.png"      alt="Benchmark — Metaplex, Magic Eden, Rarible" loading="lazy">
      <img src="quadrato-img/06_userflow.png"       alt="User Flow / Showcase #1 — Adding standards to existing token" loading="lazy">
      <img src="quadrato-img/07_screens1.png"       alt="App screens — Explorer, Asset detail, My Assets, Standards" loading="lazy">
      <img src="quadrato-img/08_screens2.png"       alt="App screens — Add standard, Asset detail after adding standard" loading="lazy">
      <img src="quadrato-img/09_dg_concept.png"     alt="Design guidance — Concept and related screens" loading="lazy">
      <img src="quadrato-img/10_typography.png"     alt="Design guidance — Typography" loading="lazy">
      <img src="quadrato-img/11_colors.png"         alt="Design guidance — Color palette" loading="lazy">
      <img src="quadrato-img/12_components.png"     alt="Design guidance — Component set: buttons, fields, NFT cards" loading="lazy">
      <img src="quadrato-img/13_closing_text.png"   alt="That's it for now!" loading="lazy">
      <img src="quadrato-img/14_quadrato_hero.png"  alt="Quadrato — Democratising NFT Standards" loading="lazy">
      <img src="quadrato-img/15_used_tools.png"     alt="Used tools and WE'LL CHANGE THE GAME" loading="lazy">
    </div>

    <nav class="proj-nav">
      <a href="index.html#work" class="proj-nav__back">← All projects</a>
      <div class="proj-nav__next">
        <span class="proj-nav__label">Next project</span>
        <a href="dissect.html" class="proj-nav__title">Dissect →</a>
      </div>
    </nav>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>© 2025 Carlos Mera</span>
      <span>Designed &amp; built with care · Barcelona</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
